{% extends "base.html" %}
{% block title %}Sign Up — Address Book{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="text-center mb-4">
      <i class="bi bi-book display-4 text-primary"></i>
      <h2 class="mt-2">Address Book</h2>
      <p class="text-muted">Create your account</p>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" name="username"
                     value="{{ request.form.get('username', '') }}"
                     placeholder="choose a username" required autofocus
                     autocomplete="username" minlength="3">
            </div>
            <div class="form-text">At least 3 characters.</div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="choose a password" required
                     autocomplete="new-password" minlength="6">
            </div>
            <div class="form-text">At least 6 characters.</div>
          </div>

          <div class="mb-4">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" class="form-control" id="confirm_password"
                     name="confirm_password" placeholder="repeat your password" required
                     autocomplete="new-password">
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-plus"></i> Create Account
          </button>
        </form>
      </div>
    </div>

    <p class="text-center mt-3 text-muted">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
